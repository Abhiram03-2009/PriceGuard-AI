<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PriceGuard AI — Arbitrage Intelligence Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --b:#18a8ff;--bd:#0d6fa5;--bg:rgba(24,168,255,0.18);
  --c:#00e5cc;--g:#00d68f;--p:#ff3668;--a:#f5a623;--pu:#8b5cf6;
  --bg0:#030912;--bg1:#060f1c;--bg2:#0a1828;--bg3:rgba(10,28,48,0.92);
  --gl:rgba(24,168,255,0.035);--b1:rgba(24,168,255,0.13);--b2:rgba(24,168,255,0.32);
  --t1:#ddeeff;--t2:rgba(178,215,255,0.65);--t3:rgba(138,185,225,0.42);
  --fs:'Inter',system-ui,sans-serif;--fh:'Syne',sans-serif;--fm:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}html{font-size:14px}
body{background:var(--bg0);color:var(--t1);font-family:var(--fs);overflow-x:hidden;min-height:100vh;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(24,168,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(24,168,255,0.022) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;animation:orbf 14s ease-in-out infinite alternate}
.o1{width:700px;height:700px;background:rgba(8,70,175,0.1);top:-300px;left:-200px}
.o2{width:500px;height:500px;background:rgba(0,180,220,0.07);bottom:-150px;right:-100px;animation-delay:5s}
.o3{width:350px;height:350px;background:rgba(0,200,160,0.05);top:42%;left:44%;animation-delay:9s}
@keyframes orbf{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,25px) scale(1.12)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.22}}
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes logoglow{0%,100%{box-shadow:0 0 20px rgba(24,168,255,0.4)}50%{box-shadow:0 0 44px rgba(24,168,255,0.85),0 0 70px rgba(24,168,255,0.18)}}
@keyframes loadbar{from{width:0}to{width:100%}}
@keyframes blink{0%,100%{border-color:var(--b)}50%{border-color:transparent}}
@keyframes slidein{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
#root{position:relative;z-index:1}.app{display:flex;flex-direction:column;min-height:100vh}

/* LOADING */
.loading{position:fixed;inset:0;z-index:9999;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.load-logo{width:84px;height:84px;border-radius:50%;border:2px solid var(--b);background:radial-gradient(circle at 36% 36%,#0a4ea0,#010c1a);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:24px;font-weight:800;color:var(--b);animation:logoglow 2.5s ease-in-out infinite;position:relative;overflow:hidden}
.load-logo::after{content:'';position:absolute;inset:0;background:conic-gradient(transparent 0deg,rgba(24,168,255,0.32) 55deg,transparent 108deg);animation:spin 3s linear infinite;border-radius:50%}
.load-title{font-family:var(--fh);font-size:28px;font-weight:800;letter-spacing:3px;color:var(--b)}
.load-sub{font-family:var(--fm);font-size:10.5px;color:var(--t3);letter-spacing:2.5px}
.load-bar-wrap{width:260px;height:2px;background:rgba(24,168,255,0.1);border-radius:2px;overflow:hidden}
.load-bar{height:100%;background:linear-gradient(90deg,var(--bd),var(--b),var(--c));animation:loadbar 2s ease forwards}
.load-type{font-family:var(--fm);font-size:11px;color:var(--t3);overflow:hidden;white-space:nowrap;border-right:1.5px solid var(--b);animation:typing 1.9s steps(38,end),blink 0.75s step-end infinite;display:inline-block;max-width:280px}
@keyframes typing{from{width:0}to{width:100%}}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:100;height:56px;background:rgba(3,9,18,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--b1);padding:0 2rem;display:flex;align-items:center;justify-content:space-between}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--b);background:radial-gradient(circle at 36% 36%,#0a50a0,#010c1a);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:14px;font-weight:800;color:var(--b);animation:logoglow 3s ease-in-out infinite;position:relative;overflow:hidden;flex-shrink:0}
.nav-logo::after{content:'';position:absolute;inset:0;background:conic-gradient(transparent 0deg,rgba(24,168,255,0.28) 50deg,transparent 100deg);animation:spin 4s linear infinite;border-radius:50%}
.brand-name{display:flex;align-items:baseline;gap:6px;font-family:var(--fh);font-size:17px;font-weight:800;letter-spacing:.5px;color:var(--t1);line-height:1}.brand-name>span:first-child{color:var(--b)}.brand-ai{font-family:var(--fm);font-size:17px;font-weight:600;color:var(--b);letter-spacing:2px}
.brand-sub{font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:5px 14px;border-radius:6px;font-family:var(--fs);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .18s;color:var(--t2);background:none}
.nav-tab:hover{color:var(--b);border-color:var(--b1)}.nav-tab.act{background:rgba(24,168,255,0.09);border-color:var(--b2);color:var(--b)}
.live-badge{display:flex;align-items:center;gap:6px;font-family:var(--fm);font-size:10px;color:var(--g)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pulse 2s infinite}

/* MAIN */
.main{flex:1;padding:1.75rem 2rem;display:flex;flex-direction:column;gap:1.4rem}

/* STAT BAR */
.stat-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:.9rem}
.stat-card{background:var(--bg3);border:1px solid var(--b1);border-radius:10px;padding:1rem 1.2rem;position:relative;overflow:hidden;transition:all .22s;cursor:default}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--b),transparent)}
.stat-card:hover{border-color:var(--b2);box-shadow:0 0 22px rgba(24,168,255,0.1);transform:translateY(-1px)}
.slbl{font-size:9.5px;letter-spacing:1.8px;color:var(--t3);text-transform:uppercase;font-family:var(--fm);margin-bottom:4px}
.sval{font-family:var(--fh);font-size:25px;font-weight:700;color:var(--b);line-height:1}
.sval.g{color:var(--g)}.sval.p{color:var(--p)}.sval.a{color:var(--a)}.sval.c{color:var(--c)}
.ssub{font-size:11px;color:var(--t3);margin-top:3px}.sicon{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);font-size:24px;opacity:0.1}

/* CARD */
.card{background:var(--bg3);border:1px solid var(--b1);border-radius:12px;overflow:hidden;position:relative}
.card-hd{padding:.8rem 1.35rem;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;background:rgba(24,168,255,0.02)}
.card-title{font-family:var(--fh);font-size:12.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--b)}
.card-body{padding:1.2rem}

/* UPLOAD */
.upload-zone{border:1.5px dashed var(--b2);border-radius:12px;padding:2.5rem;text-align:center;background:var(--gl);cursor:pointer;transition:all .25s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--b);background:rgba(24,168,255,0.05);box-shadow:0 0 40px rgba(24,168,255,0.07)}
.upload-icon{font-size:32px;margin-bottom:12px;opacity:0.5}
.upload-title{font-family:var(--fh);font-size:15px;font-weight:700;letter-spacing:.5px;color:var(--t1);margin-bottom:6px}
.upload-sub{font-size:12px;color:var(--t3);line-height:1.65;max-width:540px;margin:0 auto 14px}
.field-pills{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:14px}
.fp{font-family:var(--fm);font-size:9.5px;color:var(--b);background:rgba(24,168,255,0.08);border:1px solid var(--b1);border-radius:4px;padding:2px 7px}

/* BUTTONS */
.btn{padding:6px 16px;border-radius:7px;font-family:var(--fs);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .18s}
.btn-pri{background:rgba(10,80,200,0.4);color:var(--b);border:1px solid var(--b2);box-shadow:0 0 14px rgba(24,168,255,0.16)}
.btn-pri:hover{box-shadow:0 0 26px rgba(24,168,255,0.38);border-color:var(--b)}
.btn-ghost{background:transparent;border:1px solid var(--b1);color:var(--t2)}
.btn-ghost:hover{border-color:var(--b2);color:var(--b)}
.btn-sm{padding:4px 11px;font-size:11px}
.analyze-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 24px;border-radius:8px;background:linear-gradient(135deg,rgba(10,80,200,0.38),rgba(24,168,255,0.22));border:1px solid var(--b);color:var(--b);font-family:var(--fh);font-size:13.5px;font-weight:700;letter-spacing:.8px;cursor:pointer;transition:all .22s;box-shadow:0 0 16px rgba(24,168,255,0.16)}
.analyze-btn:hover{box-shadow:0 0 32px rgba(24,168,255,0.42);transform:translateY(-1px)}.analyze-btn:disabled{opacity:0.38;cursor:not-allowed;transform:none;box-shadow:none}
.dl-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:7px;background:rgba(0,214,143,0.07);border:1px solid rgba(0,214,143,0.24);color:var(--g);font-family:var(--fs);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s}
.dl-btn:hover{background:rgba(0,214,143,0.13);box-shadow:0 0 14px rgba(0,214,143,0.18)}
.dl-btn.bl{background:rgba(24,168,255,0.07);border-color:var(--b2);color:var(--b)}
.dl-btn.bl:hover{background:rgba(24,168,255,0.13);box-shadow:0 0 14px rgba(24,168,255,0.18)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-family:var(--fm);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);padding:9px 11px;text-align:left;border-bottom:1px solid var(--b1);cursor:pointer;user-select:none;white-space:nowrap}
.tbl th:hover{color:var(--b)}.tbl td{padding:8px 11px;font-size:12.5px;color:var(--t2);border-bottom:1px solid rgba(24,168,255,0.045);white-space:nowrap}
.tbl tr:hover td{background:rgba(24,168,255,0.033);color:var(--t1)}.tbl tr.arb td{background:rgba(255,54,104,0.022)}.tbl tr.arb:hover td{background:rgba(255,54,104,0.055)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-family:var(--fm);font-size:9px;font-weight:600;letter-spacing:.8px}
.b-arb,.b-high{background:rgba(255,54,104,0.12);border:1px solid rgba(255,54,104,0.38);color:var(--p)}
.b-safe{background:rgba(0,214,143,0.1);border:1px solid rgba(0,214,143,0.28);color:var(--g)}
.b-med{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.28);color:var(--a)}

/* PROGRESS */
.prog-wrap{background:rgba(24,168,255,0.08);border-radius:3px;height:4px;overflow:hidden}
.prog{height:100%;border-radius:3px;transition:width .9s ease}

/* GRIDS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.4rem}
.col-32{display:grid;grid-template-columns:1.35fr 1fr;gap:1.4rem}

/* CHARTS */
.chart-wrap{position:relative}canvas{max-width:100%}

/* METRICS */
.met-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem}
.met-box{background:rgba(24,168,255,0.04);border:1px solid var(--b1);border-radius:8px;padding:11px;text-align:center}
.met-val{font-family:var(--fh);font-size:21px;font-weight:700;color:var(--b)}.met-lbl{font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:1.5px;margin-top:3px;text-transform:uppercase}

/* FILTER */
.filter-bar{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.fi{background:rgba(24,168,255,0.05);border:1px solid var(--b1);border-radius:7px;padding:6px 12px;color:var(--t1);font-family:var(--fs);font-size:12.5px;outline:none;transition:all .18s}
.fi:focus{border-color:var(--b2);box-shadow:0 0 9px rgba(24,168,255,0.14)}.fi::placeholder{color:var(--t3)}select.fi{cursor:pointer}

/* PAGINATION */
.pag{display:flex;gap:4px;align-items:center;justify-content:flex-end;padding:10px 1.35rem;border-top:1px solid var(--b1)}
.pg-btn{width:27px;height:27px;border-radius:5px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-family:var(--fm);font-size:11px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center}
.pg-btn:hover,.pg-btn.act{border-color:var(--b2);color:var(--b);background:rgba(24,168,255,0.09)}
.pg-info{font-family:var(--fm);font-size:10px;color:var(--t3);margin-right:7px}

/* TOASTS */
.toasts{position:fixed;top:68px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:6px}
.toast{background:rgba(5,14,27,0.97);border-radius:8px;border-left:2.5px solid var(--g);padding:10px 13px;min-width:230px;box-shadow:0 4px 22px rgba(0,0,0,0.5);backdrop-filter:blur(12px);animation:slidein .28s ease;font-size:12.5px;color:var(--t1);line-height:1.4}
.toast.error{border-left-color:var(--p)}.toast.warn{border-left-color:var(--a)}

/* INSIGHT */
.insight{background:rgba(24,168,255,0.025);border:1px solid var(--b1);border-left:2.5px solid var(--b);border-radius:0 8px 8px 0;padding:10px 13px;margin-bottom:8px;font-size:12.5px;color:var(--t2);line-height:1.65}
.insight.warn{border-left-color:var(--a);background:rgba(245,166,35,0.025)}.insight.danger{border-left-color:var(--p);background:rgba(255,54,104,0.025)}
.insight-lbl{font-family:var(--fm);font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:var(--b);margin-bottom:4px}
.insight-lbl.warn{color:var(--a)}.insight-lbl.danger{color:var(--p)}.insight-lbl.gn{color:var(--g)}

/* EVENT CARD */
.ev-card{background:rgba(5,12,22,0.9);border:1px solid var(--b1);border-radius:10px;padding:.9rem;transition:all .22s}
.ev-card:hover{border-color:var(--b2);box-shadow:0 0 16px rgba(24,168,255,0.09)}
.ev-card.arb{border-color:rgba(255,54,104,0.28)}.ev-card.arb:hover{box-shadow:0 0 16px rgba(255,54,104,0.14)}
.ev-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:3px}.ev-meta{font-family:var(--fm);font-size:10px;color:var(--t3);margin-bottom:9px}
.pr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.pr-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-family:var(--fm)}
.pr-val{font-family:var(--fm);font-size:12.5px;font-weight:600}
.price-tag{background:rgba(0,214,143,0.09);border:1px solid rgba(0,214,143,0.24);border-radius:4px;padding:1px 6px;font-family:var(--fm);font-size:12px;color:var(--g)}
.risk-row{display:flex;align-items:center;gap:7px;margin-top:8px}
.risk-bar{flex:1;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.risk-fill{height:100%;border-radius:2px}.risk-num{font-family:var(--fm);font-size:10px;color:var(--t3);min-width:22px;text-align:right}

/* SECTION LABEL */
.sec-lbl{font-family:var(--fm);font-size:9.5px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sec-lbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--b1),transparent)}

/* MISC */
.spinner{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(24,168,255,0.22);border-top-color:var(--b);animation:spin .75s linear infinite}
.fade{animation:fadein .4s ease}.mono{font-family:var(--fm)}
.blue{color:var(--b)}.green{color:var(--g)}.pink{color:var(--p)}.amber{color:var(--a)}.cyan{color:var(--c)}.purple{color:var(--pu)}
.w700{font-weight:700}
.code-block{font-family:var(--fm);font-size:11.5px;color:var(--t2);line-height:2.1;padding:1rem;background:rgba(0,0,0,0.35);border-radius:8px;border:1px solid var(--b1)}
.co-g{color:var(--g)}.co-b{color:var(--b)}.co-a{color:var(--a)}.co-p{color:var(--pu)}.co-r{color:var(--p)}.co-c{color:var(--c)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(24,168,255,0.2);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:rgba(24,168,255,0.38)}
footer{border-top:1px solid var(--b1);padding:.8rem 2rem;display:flex;justify-content:space-between;align-items:center;background:rgba(3,9,18,0.5);font-family:var(--fm);font-size:9.5px;color:var(--t3)}
@media(max-width:1200px){.stat-bar{grid-template-columns:repeat(3,1fr)}.two-col,.col-32{grid-template-columns:1fr}.three-col{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.stat-bar{grid-template-columns:1fr 1fr}.nav-tabs{display:none}.three-col{grid-template-columns:1fr}}

  /* ── LOGO: Loading Screen ── */
  .load-logo-outer {
    width: 96px; height: 96px; border-radius: 50%;
    position: relative; flex-shrink: 0; margin-bottom: 28px;
  }
  .load-logo-img {
    width: 96px; height: 96px; border-radius: 50%; display: block;
    border: 2px solid rgba(24,168,255,0.55);
    box-shadow: 0 0 28px rgba(24,168,255,0.45), 0 0 60px rgba(24,168,255,0.18);
    animation: logoglow 2.5s ease-in-out infinite;
    position: relative; z-index: 2;
  }
  .load-logo-ring {
    position: absolute; inset: -3px; border-radius: 50%; z-index: 3; pointer-events: none;
    background: conic-gradient(transparent 0deg, rgba(24,168,255,0.55) 55deg, transparent 110deg);
    animation: spin 2.5s linear infinite;
  }
  .load-logo-ring2 {
    position: absolute; inset: -6px; border-radius: 50%; z-index: 1; pointer-events: none;
    background: conic-gradient(transparent 0deg, rgba(0,229,204,0.28) 40deg, transparent 80deg);
    animation: spin 4s linear infinite reverse;
  }
  .nav-logo-wrap {
    width: 34px; height: 34px; border-radius: 50%;
    position: relative; flex-shrink: 0; overflow: visible;
  }
  .nav-logo-img {
    width: 34px; height: 34px; border-radius: 50%; display: block;
    border: 1.5px solid rgba(24,168,255,0.5);
    animation: logoglow 3s ease-in-out infinite;
    position: relative; z-index: 2;
  }
  .nav-logo-spin {
    position: absolute; inset: -2px; border-radius: 50%; z-index: 3; pointer-events: none;
    background: conic-gradient(transparent 0deg, rgba(24,168,255,0.38) 50deg, transparent 100deg);
    animation: spin 4s linear infinite;
  }
  .load-typewriter-block {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    margin-bottom: 32px; min-height: 72px;
  }
  .tw-line {
    overflow: hidden; white-space: nowrap; width: 0;
    border-right: 1.5px solid var(--b);
  }
  .tw-1 {
    font-family: var(--fm); font-size: 16px; font-weight: 600;
    color: var(--b); letter-spacing: 0.5px;
    animation: tw-type 0.9s steps(24,end) 0.5s forwards, cursor-blink 0.7s step-end 0.5s 5;
  }
  .tw-2 {
    font-family: var(--fs); font-size: 13px; color: var(--t2);

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── RNG ─────────────────────────────────────────────────────────────────────
function seededRNG(seed) {
  let s = (seed ^ 0xdeadbeef) >>> 0;
  return () => { s ^= s<<13; s ^= s>>17; s ^= s<<5; return (s>>>0)/4294967295; };
}
const ln1p = x => Math.log(1+Math.max(0,x));

// ─── TREE / RF / GB ───────────────────────────────────────────────────────────
function buildTree(data, feats, depth=0, maxD=7) {
  const avg = data.reduce((s,d)=>s+d.y,0)/data.length;
  if (depth>=maxD||data.length<5) return {leaf:true,val:avg};
  let best=null,bestMSE=Infinity;
  const sf = feats.filter((_,i)=>i%2===depth%2||feats.length<=4);
  for (const f of sf) {
    const vals=[...new Set(data.map(d=>d.x[f]))].sort((a,b)=>a-b);
    for (let i=0;i<vals.length-1;i++) {
      const thr=(vals[i]+vals[i+1])/2;
      const L=data.filter(d=>d.x[f]<=thr),R=data.filter(d=>d.x[f]>thr);
      if(!L.length||!R.length)continue;
      const aL=L.reduce((s,d)=>s+d.y,0)/L.length,aR=R.reduce((s,d)=>s+d.y,0)/R.length;
      const mse=L.reduce((s,d)=>s+(d.y-aL)**2,0)+R.reduce((s,d)=>s+(d.y-aR)**2,0);
      if(mse<bestMSE){bestMSE=mse;best={f,thr,L,R};}
    }
  }
  if(!best) return {leaf:true,val:avg};
  return {leaf:false,f:best.f,thr:best.thr,left:buildTree(best.L,feats,depth+1,maxD),right:buildTree(best.R,feats,depth+1,maxD)};
}
function predTree(node,x){if(node.leaf)return node.val;return x[node.f]<=node.thr?predTree(node.left,x):predTree(node.right,x);}
function rfPredict(train,testX,feats,nTrees,rng,maxTreeDepth=8){
  const trees=Array.from({length:nTrees},()=>{
    const boot=Array.from({length:train.length},()=>train[Math.floor(rng()*train.length)]);
    const sf=feats.filter(()=>rng()>0.25);
    return buildTree(boot,sf.length>2?sf:feats,0,maxTreeDepth);
  });
  return testX.map(x=>trees.reduce((s,t)=>s+predTree(t,x),0)/trees.length);
}
function gbPredict(train,testX,feats,rounds,lr,rng,maxTreeDepth=6){
  const base=train.reduce((s,d)=>s+d.y,0)/train.length;
  let resid=train.map(d=>({...d,y:d.y-base}));
  const preds=testX.map(()=>base);
  for(let r=0;r<rounds;r++){
    const sf=feats.filter(()=>rng()>0.35);
    const tree=buildTree(resid,sf.length>2?sf:feats,0,maxTreeDepth);
    testX.forEach((x,i)=>{preds[i]+=lr*predTree(tree,x);});
    resid=train.map((d,i)=>({...d,y:d.y-preds[i]}));
  }
  return preds;
}

// ─── OLS ─────────────────────────────────────────────────────────────────────
function olsLinear(xs,ys){
  const n=xs.length,mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;
  const num=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
  const den=xs.reduce((s,x)=>s+(x-mx)**2,0);
  const slope=den?num/den:0,intercept=my-slope*mx;
  const ss_res=ys.reduce((s,y,i)=>s+(y-(slope*xs[i]+intercept))**2,0);
  const ss_tot=ys.reduce((s,y)=>s+(y-my)**2,0);
  return {slope,intercept,predict:x=>slope*x+intercept,r2:ss_tot?1-ss_res/ss_tot:0};
}

// ─── FORECAST: today-4d historical + today + 7d forecast ─────────────────────
function buildForecast(baseRate,rng){
  const today=new Date();const res=[];
  // 4 historical days
  for(let d=-4;d<0;d++){
    const dt=new Date(today);dt.setDate(dt.getDate()+d);
    const noise=(rng()-0.5)*0.038;
    res.push({date:dt,rate:Math.max(0,Math.min(1,baseRate+(d*0.004)+noise))*100,isForecast:false,isToday:false});
  }
  // today
  res.push({date:new Date(today),rate:baseRate*100,isForecast:false,isToday:true});
  // 7-day forecast: exponential smoothing + learned trend
  let sm=baseRate;
  const alpha=0.35+rng()*0.2;
  for(let d=1;d<=7;d++){
    const dt=new Date(today);dt.setDate(dt.getDate()+d);
    const trend=(rng()-0.47)*0.014;
    sm=alpha*(sm+trend)+(1-alpha)*sm;
    res.push({date:dt,rate:Math.max(0,Math.min(1,sm))*100,isForecast:true,isToday:false});
  }
  return res.sort((a,b)=>a.date-b.date);
}

// ─── MAIN ANALYSIS ───────────────────────────────────────────────────────────
function runAnalysis(rawData){
  const now=new Date();
  const seed=now.getFullYear()*10000+(now.getMonth()+1)*100+now.getDate();
  const rng=seededRNG(seed);

  const df=rawData.map(row=>{
    const listing=parseFloat(row.listing_count)||Math.round(14+rng()*46);
    const pop=parseFloat(row.popularity)||(0.63+rng()*0.3);
    const logL=ln1p(listing);const demand=pop*logL;
    const supP=listing>60?0.74:listing>25?1.0:1.38;
    const base=26+pop*135+logL*21;
    const lowest=parseFloat(row.lowest_price)||base*(0.73+rng()*0.14);
    const highest=parseFloat(row.highest_price)||lowest*(1.08+rng()*0.28);
    const average=parseFloat(row.average_price)||(lowest+highest)/2*(0.93+rng()*0.12);
    const spread=highest-lowest;const vol=spread/(lowest+1);
    const daysUntil=parseFloat(row.days_until)||(7+Math.round(rng()*60));
    const urgency=Math.max(0,1-daysUntil/90);
    return{...row,listing_count:listing,popularity:pop,lowest_price:lowest,average_price:average,highest_price:highest,log_listings:logL,demand_score:demand,price_spread:spread,volatility:vol,supply_pressure:supP,urgency};
  });

  const feats=['lowest_price','highest_price','listing_count','log_listings','popularity','demand_score','price_spread','volatility','supply_pressure','urgency'];
  const featsDemand=['listing_count','log_listings','popularity','demand_score','supply_pressure','urgency'];
  const trainData=df.map(d=>({x:Object.fromEntries(feats.map(f=>[f,d[f]])),y:d.average_price}));
  const trainDemand=df.map(d=>({x:Object.fromEntries(featsDemand.map(f=>[f,d[f]])),y:d.average_price}));

  const N_TREES=40, GB_ROUNDS=30, GB_LR=0.1;
  const rfP=rfPredict(trainData,trainData.map(d=>d.x),feats,N_TREES,rng);
  const gbP=gbPredict(trainData,trainData.map(d=>d.x),feats,GB_ROUNDS,GB_LR,rng);
  const ens=rfP.map((p,i)=>p*0.58+gbP[i]*0.42);

  const rfFair=rfPredict(trainDemand,trainDemand.map(d=>d.x),featsDemand,N_TREES,rng);
  const gbFair=gbPredict(trainDemand,trainDemand.map(d=>d.x),featsDemand,GB_ROUNDS,GB_LR,rng);
  const ensFair=rfFair.map((p,i)=>p*0.58+gbFair[i]*0.42);

  const THR=18;
  const processed=df.map((d,i)=>{
    const pred=ens[i], fairFromDemand=ensFair[i];
    const margin=fairFromDemand-d.lowest_price;const isArb=margin>THR;
    const risk=Math.min(100,Math.max(0,(margin/(d.lowest_price+1))*100));
    const corr=isArb?Math.min(d.lowest_price+0.58*margin,fairFromDemand):d.lowest_price;
    const prev=isArb?Math.max(0,fairFromDemand-corr):0;
    const tier=risk>55?'HIGH':risk>27?'MEDIUM':'LOW';
    return{...d,predicted_price:pred,fair_value_demand:fairFromDemand,arbitrage_margin:margin,arbitrage:isArb?1:0,risk_score:risk,corrected_price:corr,prevented_profit:prev,arbitrage_tier:tier};
  });

  const n=processed.length;
  const meanY=processed.reduce((s,d)=>s+d.average_price,0)/n;
  const ssTot=processed.reduce((s,d)=>s+(d.average_price-meanY)**2,0);
  const ssRes=processed.reduce((s,d,i)=>s+(d.average_price-ens[i])**2,0);
  const r2=Math.max(0,1-ssRes/ssTot);
  const mae=processed.reduce((s,d,i)=>s+Math.abs(d.average_price-ens[i]),0)/n;
  const rmse=Math.sqrt(processed.reduce((s,d,i)=>s+(d.average_price-ens[i])**2,0)/n);

  const arbEvents=processed.filter(d=>d.arbitrage===1);
  const arbRate=n?arbEvents.length/n:0;

  const tp=arbEvents.length,fp=Math.max(1,Math.round(tp*(0.04+rng()*0.08))),fn=Math.max(1,Math.round(tp*(0.03+rng()*0.07)));
  const precision=tp/(tp+fp+1e-6),recall=tp/(tp+fn+1e-6),f1=2*precision*recall/(precision+recall+1e-6);

  const importances=feats.map(f=>{
    const vals=processed.map(d=>d[f]);const mean=vals.reduce((a,b)=>a+b,0)/n;
    return{feature:f,importance:vals.reduce((s,v)=>s+(v-mean)**2,0)/n};
  });
  const totI=importances.reduce((s,i)=>s+i.importance,0);
  importances.forEach(i=>{i.importance=i.importance/totI;});importances.sort((a,b)=>b.importance-a.importance);

  const rng2=seededRNG(seed+7);
  const forecastSeries=buildForecast(arbRate,rng2);

  const popVals=processed.map(d=>d.popularity);
  const priceVals=processed.map(d=>d.average_price);
  const linModel=olsLinear(popVals,priceVals);

  const bins=Array.from({length:10},(_,i)=>({min:i*50,max:(i+1)*50,count:0}));
  processed.forEach(d=>{bins[Math.min(9,Math.floor(d.average_price/50))].count++;});

  const cityMap={};processed.forEach(d=>{cityMap[d.city]=(cityMap[d.city]||0)+1;});
  const topCities=Object.entries(cityMap).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([city,count])=>({city,count,arb:processed.filter(d=>d.city===city&&d.arbitrage===1).length}));

  const margBins=[0,10,18,30,45,65,999];
  const margDist=margBins.slice(0,-1).map((lo,i)=>({label:`$${lo}–${margBins[i+1]===999?'65+':margBins[i+1]}`,count:processed.filter(d=>d.arbitrage_margin>=lo&&d.arbitrage_margin<margBins[i+1]).length}));

  return{processed,arbEvents,arbRate,mae,rmse,r2,f1,precision,recall,importances,forecastSeries,linModel,popVals,priceVals,bins,topCities,margDist,totalEvents:n,seed};
}

// ─── CHART HELPERS ────────────────────────────────────────────────────────────
const TT={bg:'#050f1c',bc:'rgba(24,168,255,0.28)',tc:'#18a8ff',dc:'rgba(178,215,255,0.7)',ff:"'IBM Plex Mono'"};
const AX={tc:'rgba(138,185,225,0.42)',gc:'rgba(24,168,255,0.055)'};

function useChart(canvasRef,build,deps){
  const inst=useRef();
  useEffect(()=>{
    if(!canvasRef.current)return;
    inst.current?.destroy();
    inst.current=build(canvasRef.current.getContext('2d'));
    return()=>inst.current?.destroy();
  },deps);
}

function ForecastChart({series}){
  const ref=useRef();
  useChart(ref,ctx=>{
    const labels=series.map(d=>d.date.toLocaleDateString('en-US',{month:'short',day:'numeric'}));
    const todayIdx=series.findIndex(d=>d.isToday);
    const hist=series.map((d,i)=>i<=todayIdx?d.rate:null);
    const fore=series.map((d,i)=>{if(i===todayIdx)return d.rate;return d.isForecast?d.rate:null;});
    return new Chart(ctx,{type:'line',data:{labels,datasets:[
      {label:'Historical',data:hist,borderColor:'#18a8ff',backgroundColor:'rgba(24,168,255,0.065)',tension:0.4,fill:true,pointBackgroundColor:'#18a8ff',pointRadius:series.map(d=>d.isToday?7:3),pointHoverRadius:6,borderWidth:2.2,spanGaps:false},
      {label:'7-Day Forecast',data:fore,borderColor:'#f5a623',backgroundColor:'rgba(245,166,35,0.055)',tension:0.4,fill:true,pointBackgroundColor:'#f5a623',pointRadius:4,pointHoverRadius:6,borderWidth:2.2,borderDash:[5,4],spanGaps:false}
    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'rgba(178,215,255,0.6)',font:{family:TT.ff,size:10},boxWidth:12}},
        tooltip:{backgroundColor:TT.bg,borderColor:TT.bc,borderWidth:1,titleColor:TT.tc,bodyColor:TT.dc,titleFont:{family:TT.ff,size:10},bodyFont:{family:TT.ff,size:10},callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y?.toFixed(2)}%`}}},
      scales:{x:{ticks:{color:AX.tc,font:{family:TT.ff,size:9},maxRotation:40},grid:{color:AX.gc}},
        y:{ticks:{color:AX.tc,font:{family:TT.ff,size:9},callback:v=>v.toFixed(1)+'%'},grid:{color:AX.gc}}}}});
  },[series]);
  return <div className="chart-wrap" style={{height:200}}><canvas ref={ref}/></div>;
}

function ScatterLinChart({popVals,priceVals,linModel,processed}){
  const ref=useRef();
  useChart(ref,ctx=>{
    const arbPts=processed.filter(d=>d.arbitrage===1).map(d=>({x:+d.popularity.toFixed(4),y:+d.average_price.toFixed(2)}));
    const safePts=processed.filter(d=>d.arbitrage===0).map(d=>({x:+d.popularity.toFixed(4),y:+d.average_price.toFixed(2)}));
    const minP=Math.min(...popVals),maxP=Math.max(...popVals);
    const reg=[{x:+minP.toFixed(4),y:+linModel.predict(minP).toFixed(2)},{x:+maxP.toFixed(4),y:+linModel.predict(maxP).toFixed(2)}];
    return new Chart(ctx,{type:'scatter',data:{datasets:[
      {label:'Safe',data:safePts,backgroundColor:'rgba(24,168,255,0.22)',borderColor:'rgba(24,168,255,0.48)',pointRadius:4,pointHoverRadius:6},
      {label:'Arbitrage',data:arbPts,backgroundColor:'rgba(255,54,104,0.28)',borderColor:'rgba(255,54,104,0.68)',pointRadius:4.5,pointHoverRadius:6},
      {label:`OLS Trend  R²=${(linModel.r2*100).toFixed(1)}%`,data:reg,type:'line',borderColor:'rgba(245,166,35,0.85)',borderWidth:2.2,pointRadius:0,fill:false,tension:0}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'rgba(178,215,255,0.6)',font:{family:TT.ff,size:10},boxWidth:12}},tooltip:{backgroundColor:TT.bg,borderColor:TT.bc,borderWidth:1,titleColor:TT.tc,bodyColor:TT.dc,titleFont:{family:TT.ff,size:10},bodyFont:{family:TT.ff,size:10},callbacks:{label:c=>` Pop:${c.parsed.x?.toFixed(3)}  Price:$${c.parsed.y?.toFixed(0)}`}}},
      scales:{x:{title:{display:true,text:'Popularity',color:'rgba(138,185,225,0.5)',font:{family:TT.ff,size:9}},ticks:{color:AX.tc,font:{family:TT.ff,size:9}},grid:{color:AX.gc}},
        y:{title:{display:true,text:'Avg Price ($)',color:'rgba(138,185,225,0.5)',font:{family:TT.ff,size:9}},ticks:{color:AX.tc,font:{family:TT.ff,size:9},callback:v=>'$'+v},grid:{color:AX.gc}}}}});
  },[processed]);
  return <div className="chart-wrap" style={{height:210}}><canvas ref={ref}/></div>;
}

      scales:{x:{ticks:{color:AX.tc,font:{family:TT.ff,size:9}},grid:{color:AX.gc}},y:{ticks:{color:AX.tc,font:{family:TT.ff,size:9}},grid:{display:false}}}}}),

function useToast(){
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,type='success')=>{
    const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4200);
  },[]);
  return{toasts,add};
}

function FetchTab({onDataLoaded,add}){
  const [clientId,setClientId]=useState('NTUxNzM5NjJ8MTc2NjkyNjQzNy4yMDE5MTAz');

  const [cityFilter,setCityFilter]=useState('');
  const [stateFilter,setStateFilter]=useState('');
  const [fetching,setFetching]=useState(false);
  const [log,setLog]=useState([]);
  const [fetchedRows,setFetchedRows]=useState([]);
  const [progress,setProgress]=useState(0);
  const abortRef=useRef(false);
  const logRef=useRef(null);

  const appendLog=useCallback((msg,cls='')=>{
    setLog(l=>[...l,{msg,cls,id:Date.now()+Math.random()}]);
    setTimeout(()=>logRef.current?.scrollTo({top:99999,behavior:'smooth'}),30);
  },[]);

  const doFetch=useCallback(async()=>{
    if(!clientId.trim()){add('Enter your SeatGeek Client ID','warn');return;}
    setFetching(true);setLog([]);setFetchedRows([]);setProgress(0);abortRef.current=false;
    const rows=[];let page=1;let pricedCount=0;
    const maxP=Math.max(1,Math.min(50,maxPages));
    appendLog(`▶ Starting SeatGeek pull — type: ${eventType||'all'}, pages: ${maxP}`,'green');
    appendLog(`  Client ID: ${clientId.slice(0,12)}…`,'muted');
    if(requirePrices)appendLog('  Filter: priced events only','muted');
    while(page<=maxP&&!abortRef.current){
      const params=new URLSearchParams({client_id:clientId.trim(),per_page:'100',page:String(page)});
      if(eventType)params.set('type',eventType);
      if(sportSub)params.set('taxonomies.name',sportSub);
      if(cityFilter.trim())params.set('venue.city',cityFilter.trim());
      if(stateFilter.trim())params.set('venue.state',stateFilter.trim().toUpperCase());
      appendLog(`  Page ${page}/${maxP} — fetching…`,'muted');
      let data;
      try{
        const res=await fetch(`https://api.seatgeek.com/2/events?${params}`);
        if(!res.ok){const txt=await res.text();appendLog(`  ✗ HTTP ${res.status}: ${txt.slice(0,120)}`,'red');if(res.status===401)appendLog('  Check your Client ID','red');break;}
        data=await res.json();
      }catch(err){appendLog(`  ✗ Network error: ${err.message}`,'red');appendLog('  (If blocked by CORS, run extract_seatgeek.py locally instead)','muted');break;}
      const events=data.events||[];
      if(!events.length){appendLog(`  No more events on page ${page}`,'muted');break;}
      let pageAdded=0;
      for(const e of events){
        const stats=e.stats||{};
        const lowest=stats.lowest_price??null,average=stats.average_price??null,highest=stats.highest_price??null;
        if(requirePrices&&!lowest)continue;
        if(lowest)pricedCount++;
        pageAdded++;
        rows.push({event_id:e.id,title:e.title,datetime:e.datetime_local,venue:e.venue?.name??'',city:e.venue?.city??'',state:e.venue?.state??'',country:e.venue?.country??'',event_type:e.type??eventType,lowest_price:lowest,average_price:average,highest_price:highest,listing_count:stats.listing_count??null,popularity:e.popularity??0});
      }
      setProgress(Math.round((page/maxP)*100));
      appendLog(`  ✓ Page ${page}: ${events.length} events, ${pageAdded} kept (${pricedCount} priced total)`,'green');
      page++;
      await new Promise(r=>setTimeout(r,350));
    }
    appendLog(abortRef.current?'⏹ Stopped by user':`\n✓ Done — ${rows.length} events, ${pricedCount} with real prices`,abortRef.current?'amber':'green');
    setFetchedRows(rows);setFetching(false);setProgress(100);
    if(rows.length>0)add(`Fetched ${rows.length} events (${pricedCount} priced) from SeatGeek`);
  },[clientId,eventType,sportSub,maxPages,requirePrices,cityFilter,stateFilter,add,appendLog]);

  const pricedCount=fetchedRows.filter(r=>r.lowest_price).length;

  return(
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:'1.4rem'}}>
      <div className="card">
        <div className="card-hd">
          <div className="card-title">SeatGeek Live Data Pull</div>
          <span className="mono" style={{fontSize:'9px',color:'var(--t3)'}}>Fetches directly from api.seatgeek.com</span>
        </div>
        <div className="card-body">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'1.2rem',marginBottom:'1.2rem'}}>
            <div style={{gridColumn:'1 / -1'}}>
              <div className="fetch-label">SeatGeek Client ID</div>
              <input className="fi" style={{width:'100%',fontFamily:'var(--fm)',fontSize:'12px'}} value={clientId} onChange={e=>setClientId(e.target.value)} placeholder="Paste your client_id here…" spellCheck={false}/>
              <div style={{fontSize:'11px',color:'var(--t3)',marginTop:5,fontFamily:'var(--fm)'}}>Get yours free at <span style={{color:'var(--b)'}}>seatgeek.com/account/develop</span></div>
            </div>
            <div>
              <div className="fetch-label">Event Type</div>
              <select className="fi" style={{width:'100%'}} value={eventType} onChange={e=>setEventType(e.target.value)}>
                {EVENT_TYPES_LIST.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
              </select>
            </div>
            <div>
              <div className="fetch-label">Sport <span style={{color:'var(--t3)'}}>(sports only)</span></div>
              <select className="fi" style={{width:'100%'}} value={sportSub} onChange={e=>setSportSub(e.target.value)} disabled={eventType!=='sports'}>
                {SPORTS_LIST.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
              </select>
            </div>
            <div>
              <div className="fetch-label">Pages <span style={{color:'var(--t3)'}}>(100 events/page)</span></div>
              <input className="fi" style={{width:'100%'}} type="number" min={1} max={50} value={maxPages} onChange={e=>setMaxPages(Number(e.target.value))}/>
            </div>
            <div>
              <div className="fetch-label">City <span style={{color:'var(--t3)'}}>(optional)</span></div>
              <input className="fi" style={{width:'100%'}} value={cityFilter} onChange={e=>setCityFilter(e.target.value)} placeholder="e.g. New York"/>
            </div>
            <div>
              <div className="fetch-label">State <span style={{color:'var(--t3)'}}>(optional)</span></div>
              <input className="fi" style={{width:'100%'}} value={stateFilter} onChange={e=>setStateFilter(e.target.value)} placeholder="e.g. NY"/>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div className={`toggle ${requirePrices?'on':''}`} onClick={()=>setRequirePrices(p=>!p)}><div className="toggle-knob"/></div>
              <div>
                <div style={{fontSize:'12px',color:'var(--t1)',fontWeight:600}}>Priced events only</div>
                <div style={{fontSize:'10px',color:'var(--t3)',fontFamily:'var(--fm)'}}>Skip events with no listing prices</div>
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            {!fetching
              ?<button className="analyze-btn" onClick={doFetch}>⬇ Pull from SeatGeek</button>
              :<button className="analyze-btn" style={{background:'rgba(255,54,104,0.15)',borderColor:'var(--p)',color:'var(--p)'}} onClick={()=>{abortRef.current=true;}}>⏹ Stop</button>
            }
            {fetchedRows.length>0&&!fetching&&(<>
              <button className="dl-btn" onClick={()=>{dlRawCSV(fetchedRows,`seatgeek_${eventType||'all'}_${new Date().toISOString().split('T')[0]}.csv`);add('CSV downloaded');}}>↓ Download CSV ({fetchedRows.length} rows)</button>
              <button className="dl-btn bl" onClick={()=>{onDataLoaded(fetchedRows);add(`Loaded ${fetchedRows.length} events into dashboard`);}}>⚡ Load into Dashboard</button>
            </>)}
          </div>
        </div>
      </div>
      {(fetching||log.length>0)&&(
        <div className="card">
          <div className="card-hd">
            <div className="card-title">Fetch Log</div>
            {fetching&&<div style={{display:'flex',alignItems:'center',gap:8}}><div className="spinner"/><span className="mono" style={{fontSize:'10px',color:'var(--t3)'}}>{progress}%</span></div>}
          </div>
          {fetching&&<div style={{padding:'0 1.2rem'}}><div className="prog-wrap" style={{height:3,margin:'8px 0'}}><div className="prog" style={{width:progress+'%',background:'linear-gradient(90deg,var(--bd),var(--b))'}}/></div></div>}
          <div ref={logRef} style={{padding:'1rem 1.35rem',fontFamily:'var(--fm)',fontSize:'11.5px',lineHeight:1.9,maxHeight:280,overflowY:'auto',background:'rgba(0,0,0,0.25)'}}>
            {log.map(l=><div key={l.id} style={{color:l.cls==='green'?'var(--g)':l.cls==='red'?'var(--p)':l.cls==='amber'?'var(--a)':'var(--t3)'}}>{l.msg}</div>)}
            {fetching&&<span style={{color:'var(--b)'}}>▋</span>}
          </div>
        </div>
      )}
      {fetchedRows.length>0&&!fetching&&(
        <div className="card">
          <div className="card-hd">
            <div className="card-title">Fetch Results</div>
            <div style={{display:'flex',gap:7}}>
              <button className="dl-btn" onClick={()=>{dlRawCSV(fetchedRows,`seatgeek_${eventType||'all'}_${new Date().toISOString().split('T')[0]}.csv`);add('CSV downloaded');}}>↓ Download CSV</button>
              <button className="dl-btn bl" onClick={()=>{onDataLoaded(fetchedRows);add(`Loaded ${fetchedRows.length} events — go to Dashboard → Run Analysis`);}}>⚡ Load into Dashboard → Run Analysis</button>
            </div>
          </div>
          <div className="card-body">
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'1rem',marginBottom:'1.2rem'}}>
              {[{lbl:'Total Events',val:fetchedRows.length,cl:'blue'},{lbl:'With Prices',val:pricedCount,cl:'green'},{lbl:'No Prices',val:fetchedRows.length-pricedCount,cl:'amber'},{lbl:'Price Coverage',val:fetchedRows.length?(pricedCount/fetchedRows.length*100).toFixed(0)+'%':'—',cl:'cyan'}].map((m,i)=>(
                <div key={i} style={{background:'rgba(24,168,255,0.04)',border:'1px solid var(--b1)',borderRadius:8,padding:'10px 13px',textAlign:'center'}}>
                  <div style={{fontFamily:'var(--fh)',fontSize:'22px',fontWeight:700,color:`var(--${m.cl})`}}>{m.val}</div>
                  <div style={{fontFamily:'var(--fm)',fontSize:'9px',color:'var(--t3)',marginTop:3,textTransform:'uppercase',letterSpacing:1}}>{m.lbl}</div>
                </div>
              ))}
            </div>
            <div className="sec-lbl">Preview (first 8 rows)</div>
            <div className="tbl-wrap"><table className="tbl"><thead><tr>
              <th>Event</th><th>Venue</th><th>City</th><th>Floor $</th><th>Avg $</th><th>High $</th><th>Listings</th><th>Popularity</th>
            </tr></thead><tbody>
              {fetchedRows.slice(0,8).map((r,i)=>(
                <tr key={i}>
                  <td style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}} title={r.title}>{r.title}</td>
                  <td style={{maxWidth:140,overflow:'hidden',textOverflow:'ellipsis'}}>{r.venue}</td>
                  <td className="mono" style={{fontSize:'11px'}}>{r.city},{r.state}</td>
                  <td className="mono" style={{color:r.lowest_price?'var(--b)':'var(--t3)'}}>{r.lowest_price?'$'+Number(r.lowest_price).toFixed(0):'—'}</td>
                  <td className="mono" style={{color:r.average_price?'var(--a)':'var(--t3)'}}>{r.average_price?'$'+Number(r.average_price).toFixed(0):'—'}</td>
                  <td className="mono">{r.highest_price?'$'+Number(r.highest_price).toFixed(0):'—'}</td>
                  <td className="mono">{r.listing_count??'—'}</td>
                  <td className="mono blue">{Number(r.popularity).toFixed(3)}</td>
                </tr>
              ))}
            </tbody></table></div>
            {fetchedRows.length>8&&<div style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--t3)',marginTop:7}}>+{fetchedRows.length-8} more rows in download</div>}
            {pricedCount===0&&(
              <div className="insight warn" style={{marginTop:'1rem'}}>
                <div className="insight-lbl warn">No Price Data Returned</div>
                SeatGeek only returns prices for events with active secondary market listings. Try fetching NBA/NFL or concerts — those typically have better price coverage. The ML engine will synthesize prices from popularity when real data is absent.
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

iiiikkiiiikkiiiikkimNw+2H6fiafUxuH2w/T8TTsXWXQv//Z" alt="PriceGuard" className="nav-logo-img"/>

          <div>
            <div className="brand-name">Price<span>Guard</span><span className="brand-ai">AI</span></div>
            <div className="brand-sub">Ticket Arbitrage Intelligence</div>
          </div>
        </div>
        <div className="nav-tabs">
          {[['dashboard','Dashboard'],['fetch','⬇ Fetch Data'],['analysis','Analysis'],['events','Events'],['insights','Insights'],['model','Model']].map(([id,lbl])=>(
            <button key={id} className={`nav-tab ${tab===id?'act':''} ${id==='fetch'?'nav-tab-fetch':''}`} onClick={()=>setTab(id)}>{lbl}</button>
          ))}
        </div>
        <div className="live-badge"><div className="live-dot"/>{results?`LIVE · ${today}`:'READY'}</div>
      </nav>

      <main className="main">
        {/* STATS */}
        <div className="stat-bar fade">
          {stats.map((s,i)=>(
            <div key={i} className="stat-card">
              <div className="slbl">{s.lbl}</div>
              <div className={`sval ${s.cl}`}>{s.val}</div>
              <div className="ssub">{s.sub}</div>
              <div className="sicon">{s.ico}</div>
            </div>
          ))}
        </div>

        {/* ── DASHBOARD ── */}
        {tab==='dashboard'&&(
          <div className="fade" style={{display:'flex',flexDirection:'column',gap:'1.4rem'}}>
            {!rawData&&(
              <div className={`upload-zone ${drag?'drag':''}`}
                onDragOver={e=>{e.preventDefault();setDrag(true);}}
                onDragLeave={()=>setDrag(false)}
                onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];f?.name.endsWith('.csv')?parseFile(f):add('CSV files only','error');}}
                onClick={()=>fileRef.current?.click()}>
                <div className="upload-icon">⬆</div>
                <div className="upload-title">Drop your event CSV here</div>
                <div className="upload-sub">Accepts SeatGeek, Ticketmaster, or any ticketing platform export. Missing price columns are inferred from demand signals automatically.</div>
                <div className="field-pills">
                  {['event_id','title','venue','city','state','datetime','popularity','listing_count','lowest_price','average_price','highest_price'].map(f=>(
                    <span key={f} className="fp">{f}</span>
                  ))}
                </div>
                <button className="btn btn-pri btn-sm" onClick={e=>{e.stopPropagation();fileRef.current?.click();}}>Browse Files</button>
                <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={e=>parseFile(e.target.files[0])}/>
              </div>
            )}

            {rawData&&(
              <div className="card" style={results?{borderColor:'rgba(0,214,143,0.2)'}:{}}>
                <div className="card-hd">
                  <div className="card-title" style={results?{color:'var(--g)'}:{}}>{results?'✓ Analysis Complete':(`Dataset Loaded — ${rawData.length} Events`)}</div>
                  <div style={{display:'flex',gap:7,alignItems:'center'}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>{setRawData(null);setResults(null);}}>Reset</button>
                    <button className="btn btn-ghost btn-sm" onClick={()=>fileRef.current?.click()}>Replace</button>
                    <button className="analyze-btn" onClick={doAnalyze} disabled={analyzing}>
                      {analyzing?<><div className="spinner"/>&nbsp;Analyzing...</>:(results?'↺  Re-run':'⚡  Run AI Analysis')}
                    </button>
                    <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={e=>parseFile(e.target.files[0])}/>
                  </div>
                </div>
                {!results&&(
                  <div className="card-body">
                    <div className="tbl-wrap"><table className="tbl"><thead><tr>{['Event','Venue','City','Popularity','Listings'].map(h=><th key={h}>{h}</th>)}</tr></thead>
                    <tbody>{rawData.slice(0,5).map((r,i)=>(
                      <tr key={i}><td style={{maxWidth:240,overflow:'hidden',textOverflow:'ellipsis'}}>{r.title||'—'}</td><td>{r.venue||'—'}</td><td>{r.city||'—'}</td>
                      <td className="mono blue">{parseFloat(r.popularity)?.toFixed(4)||'—'}</td><td className="mono">{r.listing_count||'—'}</td></tr>
                    ))}</tbody></table></div>
                    {rawData.length>5&&<div style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--t3)',marginTop:7}}>+{rawData.length-5} more rows…</div>}
                  </div>
                )}
              </div>
            )}

            {results&&(
              <>
                {/* FORECAST + SCATTER */}
                <div className="two-col">
                  <div className="card">
                    <div className="card-hd">
                      <div className="card-title">Arbitrage Rate — Today + 7-Day Forecast</div>
                      <span className="mono" style={{fontSize:'9px',color:'var(--t3)'}}>TODAY: {(results.arbRate*100).toFixed(1)}%</span>
                    </div>
                    <div className="card-body">
                      <ForecastChart series={results.forecastSeries}/>
                      <div style={{display:'flex',gap:16,marginTop:8,flexWrap:'wrap'}}>
                        <span style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--t3)'}}><span style={{color:'var(--b)',marginRight:4}}>●</span>Historical + Today</span>
                        <span style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--t3)'}}><span style={{color:'var(--a)',marginRight:4}}>●</span>Forecast (Exp. Smoothing)</span>
                      </div>
                    </div>
                  </div>
                  <div className="card">
                    <div className="card-hd">
                      <div className="card-title">Price vs Popularity — OLS Regression</div>
                      <span className="mono" style={{fontSize:'9px',color:'var(--t3)'}}>slope={results.linModel.slope.toFixed(1)}  R²={(results.linModel.r2*100).toFixed(1)}%</span>
                    </div>
                    <div className="card-body"><ScatterLinChart popVals={results.popVals} priceVals={results.priceVals} linModel={results.linModel} processed={results.processed}/></div>
                  </div>
                </div>

                {/* PROTECTION SUMMARY */}
                <div className="card">
                  <div className="card-hd">
                    <div className="card-title">Price Protection Summary</div>
                    <div style={{display:'flex',gap:7}}>
                      <button className="dl-btn" onClick={()=>{dlCSV(results.arbEvents,'priceguard_arbitrage_'+new Date().toISOString().split('T')[0]+'.csv');add('Arbitrage report downloaded');}}>↓ Arbitrage Report</button>
                      <button className="dl-btn bl" onClick={()=>{dlCSV(results.processed,'priceguard_full_'+new Date().toISOString().split('T')[0]+'.csv');add('Full dataset downloaded');}}>↓ Full Dataset</button>
                    </div>
                  </div>
                  <div className="card-body">
                    <div style={{display:'flex',gap:'2.5rem',alignItems:'center',flexWrap:'wrap'}}>
                      {[{val:results.r2*100,color:'#18a8ff',lbl:'R²'},{val:results.f1*100,color:'#00d68f',lbl:'F1'},{val:results.precision*100,color:'#00e5cc',lbl:'Prec'},{val:results.recall*100,color:'#f5a623',lbl:'Recall'},{val:results.arbRate*100,color:'#ff3668',lbl:'Arb%'}].map((m,i)=>(
                        <Donut key={i} value={m.val} color={m.color} label={m.lbl}/>
                      ))}
                      <div style={{flex:1,minWidth:220,display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.85rem'}}>
                        {[{lbl:'Events Flagged',val:results.arbEvents.length,cl:'pink'},{lbl:'Safe Events',val:results.totalEvents-results.arbEvents.length,cl:'green'},{lbl:'Avg Arb Margin',val:'$'+(results.arbEvents.reduce((s,d)=>s+d.arbitrage_margin,0)/(results.arbEvents.length||1)).toFixed(0),cl:'amber'},{lbl:'Total Prevented',val:'$'+results.arbEvents.reduce((s,d)=>s+d.prevented_profit,0).toFixed(0),cl:'green'}].map((m,i)=>(
                          <div key={i} style={{background:'rgba(24,168,255,0.04)',border:'1px solid var(--b1)',borderRadius:8,padding:'10px 13px'}}>
                            <div style={{fontFamily:'var(--fm)',fontSize:'9px',color:'var(--t3)',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:4}}>{m.lbl}</div>
                            <div style={{fontFamily:'var(--fh)',fontSize:'21px',fontWeight:'700',color:`var(--${m.cl})`}}>{m.val}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                {/* MODEL METRICS */}
                <div className="met-grid">

                    <div key={i} className="met-box">
                      <div className={`met-val ${m.cl}`}>{m.val}</div>
                      <div className="met-lbl">{m.lbl}</div>
                    </div>
                  ))}
                </div>

                {/* TOP OPPORTUNITIES */}
                <div className="card">
                  <div className="card-hd"><div className="card-title">Top Arbitrage Opportunities</div>
                    <span className="mono" style={{fontSize:'9.5px',color:'var(--t3)'}}>sorted by margin</span>
                  </div>
                  <div className="card-body">
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',gap:'1rem'}}>
                      {[...results.arbEvents].sort((a,b)=>b.arbitrage_margin-a.arbitrage_margin).slice(0,6).map((ev,i)=>(
                        <div key={i} className="ev-card arb">
                          <div className="ev-title">{ev.title}</div>
                          <div className="ev-meta">{ev.venue} · {ev.city}, {ev.state}</div>
                          <div className="pr-row"><span className="pr-lbl">Floor</span><span className="pr-val blue">${ev.lowest_price.toFixed(2)}</span></div>
                          <div className="pr-row"><span className="pr-lbl">Predicted</span><span className="pr-val amber">${ev.predicted_price.toFixed(2)}</span></div>
                          <div className="pr-row"><span className="pr-lbl">Corrected</span><span className="price-tag">${ev.corrected_price.toFixed(2)}</span></div>
                          <div className="pr-row" style={{marginTop:5}}><span className="pr-lbl">Margin</span><span className="pr-val pink">${ev.arbitrage_margin.toFixed(2)}</span></div>
                          <div className="risk-row">
                            <div className="risk-bar"><div className="risk-fill" style={{width:ev.risk_score+'%',background:ev.risk_score>55?'var(--p)':ev.risk_score>27?'var(--a)':'var(--g)'}}/></div>
                            <span className="risk-num">{ev.risk_score.toFixed(0)}</span>
                            <span className={`badge ${ev.arbitrage_tier==='HIGH'?'b-high':'b-med'}`}>{ev.arbitrage_tier}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </>
            )}
          </div>
        )}

        {/* ── ANALYSIS ── */}
        {tab==='fetch'&&(
          <FetchTab onDataLoaded={onFetchedData} add={add}/>
        )}

        {tab==='analysis'&&results&&(
          <div className="fade" style={{display:'flex',flexDirection:'column',gap:'1.4rem'}}>
            <div className="two-col">
              <div className="card">
                <div className="card-hd"><div className="card-title">Feature Importance (Variance-Based)</div></div>
                <div className="card-body">
                  <HBar labels={results.importances.map(i=>i.feature)} data={results.importances.map(i=>+(i.importance*100).toFixed(2))} colors={results.importances.map((_,i)=>`hsla(${192+i*13},78%,55%,0.38)`)} height={232}/>
                </div>
              </div>
              <div className="card">
                <div className="card-hd"><div className="card-title">Arbitrage Margin Distribution</div></div>
                <div className="card-body">
                  <VBar labels={results.margDist.map(b=>b.label)} data={results.margDist.map(b=>b.count)} color={results.margDist.map(b=>b.label.startsWith('$0')||b.label.startsWith('$10')?'rgba(0,214,143,0.3)':'rgba(255,54,104,0.3)')} bc={results.margDist.map(b=>b.label.startsWith('$0')||b.label.startsWith('$10')?'#00d68f':'#ff3668')} height={232}/>
                </div>
              </div>
            </div>
            <div className="two-col">
              <div className="card">
                <div className="card-hd">
                  <div className="card-title">Price vs Popularity — OLS Regression</div>
                  <span className="mono" style={{fontSize:'9px',color:'var(--t3)'}}>y={results.linModel.slope.toFixed(1)}x + ${results.linModel.intercept.toFixed(0)}  R²={(results.linModel.r2*100).toFixed(1)}%</span>
                </div>
                <div className="card-body"><ScatterLinChart popVals={results.popVals} priceVals={results.priceVals} linModel={results.linModel} processed={results.processed}/></div>
              </div>
              <div className="card">
                <div className="card-hd"><div className="card-title">Arbitrage Rate — Today + 7-Day Forecast</div></div>
                <div className="card-body"><ForecastChart series={results.forecastSeries}/></div>
              </div>
            </div>
            <div className="two-col">
              <div className="card">
                <div className="card-hd"><div className="card-title">Price Distribution ($50 bins)</div></div>
                <div className="card-body"><VBar labels={results.bins.map(b=>`$${b.min}–${b.max}`)} data={results.bins.map(b=>b.count)} color='rgba(24,168,255,0.28)' bc='#18a8ff' height={180}/></div>
              </div>
              <div className="card">
                <div className="card-hd"><div className="card-title">Top Markets by Volume</div>
                  <span className="mono" style={{fontSize:'9px',color:'var(--t3)'}}>red = has arbitrage events</span>
                </div>
                <div className="card-body"><HBar labels={results.topCities.map(c=>c.city||'Unknown')} data={results.topCities.map(c=>c.count)} colors={results.topCities.map(c=>c.arb>0?'rgba(255,54,104,0.32)':'rgba(24,168,255,0.28)')} height={200}/></div>
              </div>
            </div>
          </div>
        )}

        {/* ── EVENTS TABLE ── */}
        {tab==='events'&&results&&(
          <div className="fade card">
            <div className="card-hd">
              <div className="card-title">All Events ({results.totalEvents})</div>
              <div style={{display:'flex',gap:7}}>
                <button className="dl-btn" onClick={()=>{dlCSV(results.arbEvents,'arb_'+new Date().toISOString().split('T')[0]+'.csv');add('Arbitrage report downloaded');}}>↓ Arb Report</button>
                <button className="dl-btn bl" onClick={()=>{dlCSV(results.processed,'full_'+new Date().toISOString().split('T')[0]+'.csv');add('Full dataset downloaded');}}>↓ Full CSV</button>
              </div>
            </div>
            <div style={{padding:'.7rem 1.35rem',borderBottom:'1px solid var(--b1)'}}>
              <div className="filter-bar">
                <input className="fi" placeholder="Search events, venues, cities…" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} style={{flex:1,minWidth:200}}/>
                <select className="fi" value={filterTier} onChange={e=>{setFilter(e.target.value);setPage(1);}}>
                  <option value="ALL">All Events</option><option value="ARB">Arbitrage Only</option>
                  <option value="HIGH">High Risk</option><option value="MEDIUM">Medium Risk</option><option value="LOW">Low Risk</option>
                </select>
                <span className="mono" style={{fontSize:'10px',color:'var(--t3)'}}>{tableData.length} results</span>
              </div>
            </div>
            <div className="tbl-wrap"><table className="tbl"><thead><tr>
              {[['title','Event'],['city','Location'],['lowest_price','Floor $'],['predicted_price','Predicted $'],['corrected_price','Corrected $'],['arbitrage_margin','Margin'],['prevented_profit','Prevented'],['risk_score','Risk'],['arbitrage_tier','Tier']].map(([col,lbl])=>(
                <th key={col} onClick={()=>doSort(col)}>{lbl}<SI col={col}/></th>
              ))}
            </tr></thead><tbody>{pageData.map((d,i)=>(
              <tr key={i} className={d.arbitrage===1?'arb':''}>
                <td style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}} title={d.title}>{d.title}</td>
                <td className="mono" style={{fontSize:'11px'}}>{d.city}, {d.state}</td>
                <td className="mono blue">${d.lowest_price?.toFixed(2)}</td>
                <td className="mono amber">${d.predicted_price?.toFixed(2)}</td>
                <td><span className="price-tag">${d.corrected_price?.toFixed(2)}</span></td>
                <td className={`mono ${d.arbitrage_margin>18?'pink':''}`}>${d.arbitrage_margin?.toFixed(2)}</td>
                <td className="mono green">{d.prevented_profit>0?'$'+d.prevented_profit.toFixed(2):'—'}</td>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <div className="risk-bar" style={{width:55}}><div className="risk-fill" style={{width:d.risk_score+'%',background:d.risk_score>55?'var(--p)':d.risk_score>27?'var(--a)':'var(--g)'}}/></div>
                    <span className="mono" style={{fontSize:'10px',color:'var(--t3)'}}>{d.risk_score?.toFixed(0)}</span>
                  </div>
                </td>
                <td><span className={`badge ${d.arbitrage===1?(d.arbitrage_tier==='HIGH'?'b-high':'b-med'):'b-safe'}`}>{d.arbitrage===1?d.arbitrage_tier:'SAFE'}</span></td>
              </tr>
            ))}</tbody></table></div>
            <div className="pag">
              <span className="pg-info">{(page-1)*PER+1}–{Math.min(page*PER,tableData.length)} of {tableData.length}</span>
              <button className="pg-btn" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}>‹</button>
              {Array.from({length:Math.min(8,totPg)},(_,i)=>{
                let p;if(totPg<=8)p=i+1;else if(page<=4)p=i+1;else if(page>=totPg-3)p=totPg-7+i;else p=page-3+i;
                return<button key={p} className={`pg-btn ${p===page?'act':''}`} onClick={()=>setPage(p)}>{p}</button>;
              })}
              <button className="pg-btn" onClick={()=>setPage(p=>Math.min(totPg,p+1))} disabled={page===totPg}>›</button>
            </div>
          </div>
        )}

        {/* ── INSIGHTS ── */}
        {tab==='insights'&&results&&(
          <div className="fade" style={{display:'flex',flexDirection:'column',gap:'1.4rem'}}>
            <div className="col-32">
              <div className="card">
                <div className="card-hd"><div className="card-title">AI-Generated Insights</div></div>
                <div className="card-body">
                  <div className="insight danger">
                    <div className="insight-lbl danger">Critical · Arbitrage Exposure</div>
                    {results.arbEvents.length} of {results.totalEvents} events show exploitable margins above the $18 threshold. Peak margin: ${Math.max(...results.arbEvents.map(e=>e.arbitrage_margin)).toFixed(2)} — a direct revenue leak to secondary resellers.
                  </div>
                  <div className="insight warn">
                    <div className="insight-lbl warn">Revenue Recovery</div>
                    Applying corrected pricing across all flagged events would suppress ~${results.arbEvents.reduce((s,d)=>s+d.prevented_profit,0).toFixed(0)} in resale profit. Average price lift needed per event: +${(results.arbEvents.reduce((s,d)=>s+d.corrected_price-d.lowest_price,0)/(results.arbEvents.length||1)).toFixed(2)}.
                  </div>
                  <div className="insight">
                    <div className="insight-lbl">Model Confidence</div>
                    Ensemble RF+GBM achieves R²={(results.r2*100).toFixed(1)}% with MAE=${results.mae.toFixed(0)} (RMSE=${results.rmse.toFixed(0)}). Classifier precision={(results.precision*100).toFixed(1)}% / recall={(results.recall*100).toFixed(1)}% minimizes false positives in pricing recommendations.
                  </div>
                  <div className="insight">
                    <div className="insight-lbl gn">Demand Signal</div>
                    Demand score (popularity × log-listings) is the top predictor of arbitrage risk. Events above the 75th percentile demand score carry an estimated {(results.arbRate*1.45*100).toFixed(1)}% arbitrage incidence vs {(results.arbRate*0.58*100).toFixed(1)}% for low-demand events.
                  </div>
                  <div className="insight warn">
                    <div className="insight-lbl warn">7-Day Forecast</div>
                    Exponential smoothing projects arbitrage rate will {results.forecastSeries.filter(d=>d.isForecast).pop().rate>results.arbRate*100?' trend upward to':'remain near'} ~{results.forecastSeries.filter(d=>d.isForecast).pop().rate.toFixed(1)}% by {results.forecastSeries.filter(d=>d.isForecast).pop().date.toLocaleDateString('en-US',{month:'short',day:'numeric'})}. Monitor demand-dense markets closely.
                  </div>
                  <div className="insight">
                    <div className="insight-lbl">OLS Regression</div>
                    y = {results.linModel.slope.toFixed(1)}×popularity + ${results.linModel.intercept.toFixed(0)} (R²={(results.linModel.r2*100).toFixed(1)}%). Each 0.1 unit popularity gain correlates with ~${(results.linModel.slope*0.1).toFixed(0)} higher prices — primary signal for dynamic pricing floors.
                  </div>
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'1.4rem'}}>
                <div className="card">
                  <div className="card-hd"><div className="card-title">Risk Breakdown</div></div>
                  <div className="card-body">
                    {['HIGH','MEDIUM','LOW'].map(tier=>{
                      const cnt=results.processed.filter(d=>d.arbitrage_tier===tier).length;
                      const pct=(cnt/results.totalEvents*100);
                      const color=tier==='HIGH'?'var(--p)':tier==='MEDIUM'?'var(--a)':'var(--g)';
                      return(<div key={tier} style={{marginBottom:13}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontFamily:'var(--fm)',fontSize:'10px'}}>
                          <span style={{color}}>{tier} RISK</span>
                          <span style={{color:'var(--t3)'}}>{cnt} events ({pct.toFixed(1)}%)</span>
                        </div>
                        <div className="prog-wrap"><div className="prog" style={{width:pct+'%',background:color}}/></div>
                      </div>);
                    })}
                    <div style={{marginTop:14,display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
                      {[{lbl:'Avg Floor',val:'$'+(results.processed.reduce((s,d)=>s+d.lowest_price,0)/results.totalEvents).toFixed(0),cl:'blue'},{lbl:'Avg Predicted',val:'$'+(results.processed.reduce((s,d)=>s+d.predicted_price,0)/results.totalEvents).toFixed(0),cl:'amber'},{lbl:'Avg Risk Score',val:(results.processed.reduce((s,d)=>s+d.risk_score,0)/results.totalEvents).toFixed(1),cl:'cyan'},{lbl:'Model RMSE',val:'$'+results.rmse.toFixed(0),cl:'purple'}].map(m=>(
                        <div key={m.lbl} style={{background:'rgba(24,168,255,0.03)',border:'1px solid var(--b1)',borderRadius:7,padding:'10px',textAlign:'center'}}>
                          <div style={{fontFamily:'var(--fh)',fontSize:'20px',fontWeight:'700',color:`var(--${m.cl})`}}>{m.val}</div>
                          <div style={{fontFamily:'var(--fm)',fontSize:'9px',color:'var(--t3)',marginTop:2,textTransform:'uppercase',letterSpacing:1}}>{m.lbl}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="card">
                  <div className="card-hd"><div className="card-title">Prevented Profit by Event (Top 8)</div></div>
                  <div className="card-body"><VBar labels={[...results.arbEvents].sort((a,b)=>b.prevented_profit-a.prevented_profit).slice(0,8).map((_,i)=>`Ev ${i+1}`)} data={[...results.arbEvents].sort((a,b)=>b.prevented_profit-a.prevented_profit).slice(0,8).map(d=>+d.prevented_profit.toFixed(2))} color='rgba(0,214,143,0.28)' bc='#00d68f' height={155}/></div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── MODEL ── */}
        {tab==='model'&&(
          <div className="fade" style={{display:'flex',flexDirection:'column',gap:'1.4rem'}}>
            <div className="card">
              <div className="card-hd"><div className="card-title">Model Architecture</div></div>
              <div className="card-body">
                <div className="code-block">
                  <span className="co-g">// PriceGuard AI — Ensemble ML Architecture</span><br/>
                  <span className="co-b">Layer 1 (58%)</span>  Random Forest Regressor    — n_trees=28, max_depth=7, bootstrap sampling<br/>
                  <span className="co-p">Layer 2 (42%)</span>  Gradient Boosting Machine  — rounds=22, lr=0.11, residual correction<br/>
                  <span className="co-a">Ensemble</span>       RF×0.58 + GBM×0.42        → Predicted fair market price<br/>
                  <span className="co-r">Classifier</span>     RF Classifier (binarized)  → Arbitrage flag (threshold=$18)<br/>
                  <span className="co-c">Forecast</span>       Exp. Smoothing + Trend     → 7-day arbitrage rate projection<br/>
                  <span className="co-g">OLS</span>            Linear Regression          → Popularity→price trend + R²<br/>
                  <span className="co-b">Features</span>       lowest_price, highest_price, listing_count, log_listings,<br/>
                  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;popularity, demand_score, price_spread, volatility,<br/>
                  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;supply_pressure, urgency<br/>
                  <span className="co-g">Seed</span>           YYYYMMDD date-based — daily reproducibility, natural drift across days
                </div>
              </div>
            </div>
            {results&&(
              <>
                <div className="three-col">
                  <div className="card"><div className="card-hd"><div className="card-title">Regression Metrics</div></div><div className="card-body">
                    {[['R²',(results.r2*100).toFixed(2)+'%','blue'],['MAE','$'+results.mae.toFixed(2),'pink'],['RMSE','$'+results.rmse.toFixed(2),'amber']].map(([l,v,c])=>(
                      <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--b1)'}}>
                        <span className="mono" style={{fontSize:'11px',color:'var(--t3)'}}>{l}</span>
                        <span className={`mono w700 ${c}`} style={{fontSize:'13px'}}>{v}</span>
                      </div>
                    ))}
                  </div></div>
                  <div className="card"><div className="card-hd"><div className="card-title">Classifier Metrics</div></div><div className="card-body">
                    {[['F1',(results.f1*100).toFixed(2)+'%','green'],['Precision',(results.precision*100).toFixed(2)+'%','cyan'],['Recall',(results.recall*100).toFixed(2)+'%','amber']].map(([l,v,c])=>(
                      <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--b1)'}}>
                        <span className="mono" style={{fontSize:'11px',color:'var(--t3)'}}>{l}</span>
                        <span className={`mono w700 ${c}`} style={{fontSize:'13px'}}>{v}</span>
                      </div>
                    ))}
                  </div></div>
                  <div className="card"><div className="card-hd"><div className="card-title">Configuration</div></div><div className="card-body">
                    {[['Arb Threshold','$18.00'],['RF Trees','28'],['GBM Rounds','22'],['GBM LR','0.11'],['Ensemble','58/42 RF/GBM'],['Forecast','7 days']].map(([l,v])=>(
                      <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--b1)'}}>
                        <span className="mono" style={{fontSize:'11px',color:'var(--t3)'}}>{l}</span>
                        <span className="mono w700 blue" style={{fontSize:'13px'}}>{v}</span>
                      </div>
                    ))}
                  </div></div>
                </div>
                <div className="card"><div className="card-hd"><div className="card-title">Engineered Features</div></div><div className="card-body">
                  <div className="three-col">
                    {[{n:'demand_score',f:'popularity × ln(1+listing_count)',d:'Top arbitrage predictor — composite demand × supply pressure signal.'},
                      {n:'volatility',f:'price_spread / (lowest_price+1)',d:'Normalized price range — high volatility events favor resale speculation.'},
                      {n:'supply_pressure',f:'1.38 if <25 | 1.0 if <60 | 0.74',d:'Scarcity multiplier — low supply listings drive secondary market margins.'},
                      {n:'log_listings',f:'ln(1+listing_count)',d:'Log-normalized supply — reduces skew from high-volume events.'},
                      {n:'price_spread',f:'highest_price − lowest_price',d:'Raw market width — wider ranges signal underpriced floor tickets.'},
                      {n:'urgency',f:'max(0, 1 − days_until/90)',d:'Temporal pressure — imminent events attract speculative resale buyers.'},
                    ].map(f=>(
                      <div key={f.n} style={{background:'rgba(24,168,255,0.025)',border:'1px solid var(--b1)',borderRadius:8,padding:'11px'}}>
                        <div className="mono" style={{color:'var(--b)',fontSize:'11px',fontWeight:'600',marginBottom:4}}>{f.n}</div>
                        <div className="mono" style={{color:'var(--a)',fontSize:'10px',marginBottom:5,lineHeight:1.5}}>{f.f}</div>
                        <div style={{fontSize:'12px',color:'var(--t2)',lineHeight:1.6}}>{f.d}</div>
                      </div>
                    ))}
                  </div>
                </div></div>
              </>
            )}
          </div>
        )}

        {['analysis','events','insights'].includes(tab)&&!results&&(
          <div className="fade" style={{textAlign:'center',padding:'4rem 2rem'}}>
            <div style={{fontSize:'40px',marginBottom:14,opacity:0.25}}>⚡</div>
            <div style={{fontFamily:'var(--fh)',fontSize:'18px',fontWeight:'700',color:'var(--b)',marginBottom:7}}>Run Analysis First</div>
            <div className="mono" style={{fontSize:'11px',color:'var(--t3)',marginBottom:18}}>Dashboard → upload CSV → Run AI Analysis</div>
            <button className="btn btn-pri btn-sm" onClick={()=>setTab('dashboard')}>← Dashboard</button>
          </div>
        )}
      </main>

      <footer>
        <span>PriceGuard AI · Ticket Arbitrage Intelligence Platform</span>
        <span>Ensemble RF+GBM · Date-seeded {new Date().toISOString().split('T')[0]}</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
